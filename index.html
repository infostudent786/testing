<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Runner | Game 01 - QUICK GAME 15</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #f800ac;
            --neon-yellow: #fff300;
            --bg-color: #03040e; /* Cyberpunk background */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            overflow: hidden;
            color: #fff;
            font-family: 'Courier New', Courier, monospace; /* Digital font */
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Screen Glitch Overlay */
        #glitch-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0);
            pointer-events: none;
            z-index: 999;
        }

        /* Game Over / UI Screens */
        .game-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            border: 4px solid var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            padding: 40px;
            text-align: center;
            border-radius: 12px;
            z-index: 1000;
            display: none;
        }

        .game-overlay h1 {
            color: var(--neon-pink);
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .game-overlay p {
            color: #ccc;
            margin-bottom: 30px;
        }

        .game-overlay button {
            padding: 15px 30px;
            background: none;
            border: 2px solid var(--neon-yellow);
            color: var(--neon-yellow);
            font-family: inherit;
            font-size: 1.2rem;
            cursor: pointer;
            text-shadow: 0 0 5px var(--neon-yellow);
            transition: all 0.2s ease;
        }

        .game-overlay button:hover {
            background-color: rgba(255, 243, 0, 0.2);
            box-shadow: 0 0 15px var(--neon-yellow);
        }
        
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }

        #score-display {
            font-size: 2rem;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div id="score-display">SCORE: 000000</div>
        </div>

        <div class="game-overlay" id="overlay-screen">
            <h1 id="overlay-title">NEON RUNNER</h1>
            <p id="overlay-msg">Jump to Survive. Miss the Spikes.</p>
            <p id="high-score-msg">HI-SCORE: 0</p>
            <button id="start-btn">START LEVEL 01</button>
        </div>

        <div id="glitch-overlay"></div>
    </div>

    <script>
        // --- GAME LOGIC ---

        // Local Storage for High Score
        let highScore = localStorage.getItem('neonRunnerHiScore') || 0;
        document.getElementById('high-score-msg').textContent = `HI-SCORE: ${highScore}`;

        // Phase 3 Configuration
        const config = {
            type: Phaser.AUTO,
            width: 1280,
            height: 720,
            parent: 'game-container',
            backgroundColor: '#03040e',
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 1800 }, // Snappy, Hyper-casual gravity
                    debug: false
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        // Global Game Variables
        let player;
        let platforms;
        let obstacles;
        let cursors;
        let score = 0;
        let scoreText;
        let isGameOver = false;
        let gameStarted = false;
        let gameSpeed = -500; // Base speed
        let obstacleTimer;
        let particleEmitter;

        // UI Dom Elements
        const overlayScreen = document.getElementById('overlay-screen');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayMsg = document.getElementById('overlay-msg');
        const startBtn = document.getElementById('start-btn');
        const scoreDisplay = document.getElementById('score-display');


        // --- PHASER FUNCTIONS ---

        function preload() {
            // Generate basic assets procedurally (no external images needed)
            this.load.image('ground', 'https://labs.phaser.io/assets/shapes/rectangle-black.png');
        }

        function create() {
            // 1. Create the Ground (Neon Track)
            platforms = this.physics.add.staticGroup();
            
            // Generate floor segments
            for (let i = 0; i < 4; i++) {
                 let floor = platforms.create(i * 1280, 700, 'ground').setOrigin(0, 0).setDisplaySize(1280, 20).refreshBody();
                 floor.setTint(0x00d2ff); // Neon Blue
            }
            
            // Add physics to ground, but remove default collision (we handle it manually for seamless movement)
            this.physics.add.collider(platforms, platforms); 


            // 2. The Player (Glowing Square)
            player = this.add.rectangle(150, 600, 50, 50, 0x2ea043); // GitHub Green
            this.physics.add.existing(player);
            
            player.body.setCollideWorldBounds(true);
            
            // Manual collision with ground for seamless effect
            this.physics.add.collider(player, platforms);


            // 3. Obstacles (Neon Pink Spikes)
            obstacles = this.physics.add.group();
            
            this.physics.add.collider(obstacles, platforms);
            
            // COLLISION: Player hits obstacle (Game Over)
            this.physics.add.overlap(player, obstacles, hitObstacle, null, this);


            // 4. JUICE: Score/Jump Effects (Particles)
            particleEmitter = this.add.particles(0, 0, 'ground', {
                speed: 100,
                scale: { start: 0.1, end: 0 },
                alpha: { start: 0.8, end: 0 },
                blendMode: 'ADD',
                lifespan: 1000,
                gravityY: 100,
                on: false
            });


            // 5. INPUTS: Spacebar & Mouse
            cursors = this.input.keyboard.createCursorKeys();
            this.input.on('pointerdown', jump, this); // Mouse/Tap


            // 6. SCORE
            scoreText = document.getElementById('score-display');


            // Initialize Start State
            this.physics.pause();
            overlayScreen.style.display = 'block';
            startBtn.addEventListener('click', startGame, this);
        }

        function update() {
            if (!gameStarted || isGameOver) return;

            // 1. INPUT CHECK (JUMP)
            if (Phaser.Input.Keyboard.JustDown(cursors.space)) {
                jump();
            }

            // 2. PARALLAX EFFECT: Move platforms endlessly
            platforms.children.entries.forEach(platform => {
                platform.x += gameSpeed * 0.016; // Maintain illusion of speed
                
                // Reset platform position once it moves off screen
                if (platform.x <= -1280) {
                    platform.x = (platforms.children.size - 1) * 1280;
                }
            });

            // 3. Move Obstacles
            obstacles.children.entries.forEach(obstacle => {
                // If obstacle off-screen, destroy it
                if (obstacle.x < -100) {
                    obstacle.destroy();
                }
            });

            // 4. Update Score & Difficulty (Increase Speed)
            score += 1;
            gameSpeed -= 0.05; // Smoothly increase speed
            scoreDisplay.textContent = `SCORE: ${String(score).padStart(6, '0')}`;
        }

        // --- GAME ACTIONS ---

        function jump() {
            // High-quality Phaser constraint: must be on the floor to jump
            if (player.body.touching.down && !isGameOver) {
                player.body.setVelocityY(-900); // Snappy hyper-casual jump force
                
                // JUICE: Particle effect at jump point
                particleEmitter.emitParticleAt(player.x, player.y + 25, 20);
                particleEmitter.setTint(0x00d2ff); // Match Neon Blue floor
                
                // Smooth tween animation (Squash & Stretch)
                game.scene.scenes[0].tweens.add({
                    targets: player,
                    scaleX: 1.2,
                    scaleY: 0.8,
                    yoyo: true,
                    duration: 100,
                    ease: 'Quad.easeInOut'
                });
            }
        }

        function spawnObstacle() {
            if (isGameOver) return;

            // Randomize size of obstacle
            let height = Phaser.Math.Between(50, 100);
            
            // Create the spike object
            let obstacle = obstacles.create(1380, 700 - (height/2), 'ground');
            obstacle.setDisplaySize(40, height);
            obstacle.setTint(0xf800ac); // Neon Pink
            
            // Phaser Physics: Give it velocity, remove gravity influence
            obstacle.body.setVelocityX(gameSpeed);
            obstacle.body.setAllowGravity(false);
            
            // JUICE: Smooth entry animation
            game.scene.scenes[0].tweens.add({
                targets: obstacle,
                alpha: { start: 0, end: 1 },
                duration: 200
            });

            // Randomize next spawn time (increases difficulty)
            let nextSpawn = Phaser.Math.Between(800, 2000);
            obstacleTimer = game.scene.scenes[0].time.addEvent({
                delay: nextSpawn,
                callback: spawnObstacle,
                callbackContext: this
            });
        }

        function startGame() {
            gameStarted = true;
            isGameOver = false;
            score = 0;
            gameSpeed = -500;
            
            // UI Update
            overlayScreen.style.display = 'none';
            scoreDisplay.textContent = 'SCORE: 000000';
            
            // Start Physics & Spawning
            game.scene.scenes[0].physics.resume();
            spawnObstacle();
        }

        function hitObstacle(playerBody, obstacle) {
            isGameOver = true;
            gameStarted = false;
            
            game.scene.scenes[0].physics.pause();
            obstacle.setTint(0xda3633); // Red (Failure)
            
            // JUICE: Shake the screen
            game.scene.scenes[0].cameras.main.shake(300, 0.01);
            
            // JUICE: Failure Glitch Effect (CSS overlay)
            document.getElementById('glitch-overlay').style.background = 'rgba(255, 0, 0, 0.2)';
            setTimeout(() => document.getElementById('glitch-overlay').style.background = 'rgba(0, 0, 0, 0)', 300);

            // Handle High Score
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('neonRunnerHiScore', highScore);
                document.getElementById('high-score-msg').textContent = `NEW HI-SCORE: ${highScore}`;
            } else {
                document.getElementById('high-score-msg').textContent = `HI-SCORE: ${highScore}`;
            }

            // Show Game Over Screen
            overlayTitle.textContent = "BUILD FAILED";
            overlayMsg.textContent = `Crash detected. Final score: ${score}`;
            startBtn.textContent = "RETRY DEPLOYMENT";
            overlayScreen.style.display = 'block';
            
            // Reset for next start (removed old event listener)
            startBtn.removeEventListener('click', startGame);
            startBtn.addEventListener('click', resetLevel);
        }
        
        function resetLevel() {
            // Reset obstacles group
            obstacles.clear(true, true);
            if (obstacleTimer) obstacleTimer.remove();
            
            // Reset Player
            player.setPosition(150, 600);
            
            // Call start again
            startGame();
        }

    </script>
</body>
</html>
